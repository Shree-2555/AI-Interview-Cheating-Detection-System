<!DOCTYPE html>
<html>
<body>

<h2>Camera Test</h2>
<video id="video" autoplay></video>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    document.getElementById("video").srcObject = stream;
    console.log("Camera working");
})
.catch(err => {
    console.error("Error:", err);
    alert(err.message);
});
</script>

</body>
</html>
